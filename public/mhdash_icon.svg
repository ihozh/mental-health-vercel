<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">

  <!-- Circle: cx=80, cy=80, r=62 → top of circle = y=18 -->
  <circle cx="80" cy="80" r="62" fill="none" stroke="#1C2848" stroke-width="5.5"/>

  <!-- Left flat baseline -->
  <path d="M18,80 L66,80" fill="none" stroke="#1C2848" stroke-width="3.2" stroke-linecap="round"/>

  <!-- Main upward spike: narrow, symmetric, tip exactly at (80,18) on circle -->
  <path d="M66,80 L72,50 L80,18 L88,50 L94,80"
        fill="none" stroke="#E08848" stroke-width="3.2"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Gap, then small downward spike -->
  <path d="M98,80 L101,80 L105,104 L109,80"
        fill="none" stroke="#E08848" stroke-width="2.0"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right flat baseline -->
  <path d="M109,80 L142,80" fill="none" stroke="#1C2848" stroke-width="3.2" stroke-linecap="round"/>

  <!-- Teal dot sitting exactly on circle top -->
  <circle cx="80" cy="18" r="8"   fill="#2ABFBF"/>
  <circle cx="80" cy="18" r="4.5" fill="#ffffff"/>

</svg>
